strava:
  client_id: "229888"
  # client_secret, access_token, refresh_token, expires_at → credentials.local.yml (non versionné)

# ── Connexion Strava — guide bootstrap ───────────────────────────────────────
#
# Priorité de résolution des credentials dans les scripts :
#   1. ~/.config/strava-mcp/config.json  (géré par le MCP Strava, auto-refresh)
#   2. ./ext-services-config/credentials.local.yml  (override local, non versionné)
#
# Si aucune des deux sources n'existe, suivre les étapes ci-dessous.
#
# ── Étape 1 : récupérer le client_secret ─────────────────────────────────────
#   https://www.strava.com/settings/api  →  app "229888"  →  copier le client_secret
#
# ── Étape 2 : obtenir les tokens via OAuth ───────────────────────────────────
#   a. Ouvrir dans un navigateur :
#      https://www.strava.com/oauth/authorize?client_id=229888&response_type=code&redirect_uri=http://localhost&approval_prompt=force&scope=activity:read_all
#
#   b. Après autorisation, récupérer le paramètre `code` dans l'URL de redirection
#      Exemple : http://localhost/?state=&code=XXXXXXXX&scope=...
#
#   c. Échanger le code :
#      curl -X POST https://www.strava.com/oauth/token \
#        -d client_id=229888 \
#        -d client_secret=SECRET \
#        -d code=CODE \
#        -d grant_type=authorization_code
#
#   d. Réponse JSON → copier access_token, refresh_token, expires_at
#
# ── Étape 3 : créer credentials.local.yml ────────────────────────────────────
#   cp ext-services-config/credentials.local.yml.example ext-services-config/credentials.local.yml
#   # puis remplir les valeurs
#
# ── Renouveler un token expiré ───────────────────────────────────────────────
#   curl -X POST https://www.strava.com/oauth/token \
#     -d client_id=229888 \
#     -d client_secret=SECRET \
#     -d refresh_token=REFRESH_TOKEN \
#     -d grant_type=refresh_token
